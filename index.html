            z-index: 10;
        }
        .sidebar-header {
            padding: 30px 20px;
            background-color: #0A2249;
            text-align: center;
        }
        .sidebar-header img {
            max-width: 150px;
            margin-bottom: 15px;
            filter: brightness(0) invert(1);
        }
        .sidebar-header h2 {
            margin: 0;
            font-size: 16px;
            color: #0B7C3B;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }
        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }
        .nav-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }
        .nav-link::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: transparent;
            margin-right: 15px;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            background-color: rgba(11, 124, 59, 0.2);
            color: white;
            padding-left: 32px;
        }
        .nav-link.active {
            background-color: #0B7C3B;
            color: white;
        }
        .nav-link.active::before {
            background-color: white;
        }
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #e9ecef;
            position: relative;
        }
        .main-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 300px;
            background: linear-gradient(135deg, #0B7C3B 0%, #0C2B5C 100%);
            opacity: 0.1;
            z-index: 0;
        }
        .topbar {
            height: 80px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 10;
        }
        .topbar h1 {
            margin: 0;
            font-size: 22px;
            color: #0C2B5C;
            font-weight: 700;
        }
        .iframe-container {
            flex-grow: 1;
            padding: 40px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }
        iframe {

            max-width: 800px;
            height: 600px;

            border-radius: 12px;
            background-color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.05);

    <script>
        function loadSignature(id, element, name) {
            const iframe = document.getElementById('sig-frame');
            
            iframe.style.opacity = '0.5';
            iframe.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                iframe.srcdoc = document.getElementById('tpl-' + id).innerHTML;
                document.getElementById('current-name').textContent = name + "'s Signature";
                
                iframe.style.opacity = '1';
                iframe.style.transform = 'translateY(0)';
            }, 150);
            
            var links = document.getElementsByClassName('nav-link');
            for (var i = 0; i < links.length; i++) {
                links[i].classList.remove('active');
            }
            if (element) {
                element.classList.add('active');
            }
        }

        window.onload = function() {
            const firstLink = document.querySelector('.nav-link');
            loadSignature('luke', firstLink, 'Luke M');
        };
    </script>
